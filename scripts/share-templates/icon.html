<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        background: white;
      }
      body {
        width: 100vw;
        height: 100vh;
        display: grid;
        place-items: center;
      }
      svg {
        width: 100%;
        height: 100%;
        display: block;
      }
    </style>
  </head>
  <body>
    <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <!-- soft mint backdrop circle so the mark reads on dark UI chrome too -->
      <circle cx="50" cy="50" r="48" fill="#F0FDF4" />
      <!-- stem -->
      <path
        d="M50 92 L50 50"
        stroke="#15803D"
        stroke-width="6"
        stroke-linecap="round"
      />
      <!-- left leaf -->
      <path
        d="M50 55 C 30 50 18 35 23 16 C 44 20 54 38 50 55 Z"
        fill="#22C55E"
      />
      <!-- right leaf (slightly darker for depth) -->
      <path
        d="M50 55 C 70 50 82 35 77 16 C 56 20 46 38 50 55 Z"
        fill="#16A34A"
      />
      <!-- inner vein highlights -->
      <path
        d="M50 55 C 41 47 35 36 32 24"
        stroke="#15803D"
        stroke-width="1.5"
        fill="none"
        stroke-linecap="round"
        opacity="0.5"
      />
      <path
        d="M50 55 C 59 47 65 36 68 24"
        stroke="#0F1A14"
        stroke-width="1.5"
        fill="none"
        stroke-linecap="round"
        opacity="0.35"
      />
    </svg>
  </body>
</html>
